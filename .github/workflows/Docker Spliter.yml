name: Docker Image to Source

on:
  workflow_dispatch:
    inputs:
      image_name:
        description: 'نام کامل ایمیج (مثلاً ghcr.io/user/repo:tag)'
        required: true

permissions:
  contents: write # دسترسی لازم برای آپلود فایل‌ها به مخزن

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Pull and Save Docker Image
        run: |
          # 1. دانلود ایمیج
          docker pull ${{ github.event.inputs.image_name }}
          
          # 2. تمیز کردن نام برای ساخت پوشه
          SAFE_NAME=$(echo "${{ github.event.inputs.image_name }}" | sed 's/[\/:]/_/g')
          
          # 3. ذخیره در یک فایل موقت
          docker save ${{ github.event.inputs.image_name }} -o image.tar
          
          # 4. ساخت پوشه مقصد
          mkdir -p "downloads/$SAFE_NAME"
          
          # 5. تکه تکه کردن فایل به پارت‌های 50 مگابایتی
          split -b 50M image.tar "downloads/$SAFE_NAME/part_"
          
          # 6. حذف فایل اصلی (بسیار مهم برای جلوگیری از ارور حجم گیت‌هاب)
          rm image.tar
          
          echo "DIR_NAME=downloads/$SAFE_NAME" >> $GITHUB_ENV

      - name: Commit and Push to Source
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # اضافه کردن فقط پارت‌های جدید به گیت
          git add downloads/
          
          # بررسی اینکه آیا تغییری برای کامیت هست یا نه
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Add Docker image: ${{ github.event.inputs.image_name }}"
            git push
          fi
